<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 5</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Login Form</legend>
            Name:<input type="text" value="" autocorrect="" required="" placeholder="Enter your name"/>
            <br/>
            <br/>
            color:<input type="color" value="">
            <br/>
            <br/>
            Email:<input type="email" value="" required="" placeholder="Enter your email"/>
            <br/>
            <br/>
            Password:<input type="password" value="" required="" placeholder="Enter your password" maxlength="8"/>
            <br/>
            <br/>
            Age:<input type="number" min="18" max="28" checked="" required/>
            <br/>
            <br/>
            Secret:
            <input type="hidden" value="secret"/>
            <br/>
            <br/>
            Range:<input type="range" name="range" disabled=""/>
             <br/>
             <br/>
            <input type ="submit" value="submit">
            <input type="reset" value="reset">
        </fieldset>    
    </form>
</body>
</html>
